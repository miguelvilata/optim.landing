<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#143250"/>
      <stop offset="50%" stop-color="#1A365D"/>
      <stop offset="100%" stop-color="#1e4080"/>
    </linearGradient>
    <radialGradient id="glow" cx="65%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Decorative circles -->
  <circle cx="980" cy="120" r="180" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.15"/>
  <circle cx="980" cy="120" r="120" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.1"/>
  <circle cx="100" cy="550" r="140" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.1"/>

  <!-- Logo mark -->
  <g transform="translate(100, 190)">
    <circle cx="70" cy="70" r="60" fill="none" stroke="white" stroke-width="14"/>
    <circle cx="70" cy="70" r="34" fill="#1A365D"/>
    <path d="M70 10 A60 60 0 0 1 130 70" fill="none" stroke="#3B82F6" stroke-width="14" stroke-linecap="round"/>
  </g>

  <!-- App name -->
  <text x="230" y="235" font-family="Inter, system-ui, sans-serif" font-size="80" font-weight="700" fill="white" letter-spacing="-2">Optim</text>

  <!-- Tagline -->
  <text x="230" y="295" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="400" fill="#93C5FD">Seguros y Gastos</text>

  <!-- Description -->
  <text x="100" y="400" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#CBD5E1">Gestiona todas tus polizas y gastos</text>
  <text x="100" y="445" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#CBD5E1">recurrentes en un solo lugar.</text>

  <!-- CTA pill -->
  <rect x="100" y="490" width="260" height="56" rx="28" fill="#3B82F6"/>
  <text x="230" y="524" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600" fill="white" text-anchor="middle">Disponible en Android</text>
</svg>
