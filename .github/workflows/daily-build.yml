name: Daily build

on:
  schedule:
    - cron: '0 6 * * *'  # every day at 06:00 UTC — publishes posts with pubDate <= today
  workflow_dispatch:       # manual trigger from GitHub Actions UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          PUBLIC_GOOGLE_PLAY_URL: ${{ vars.PUBLIC_GOOGLE_PLAY_URL }}
          PUBLIC_APP_STORE_URL: ${{ vars.PUBLIC_APP_STORE_URL }}
          PUBLIC_ANALYTICS_DOMAIN: ${{ vars.PUBLIC_ANALYTICS_DOMAIN }}
          PUBLIC_SUPABASE_URL: ${{ vars.PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ vars.CF_ACCOUNT_ID }}
          command: pages deploy dist --project-name=optim-landing --branch=main
